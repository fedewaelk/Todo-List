<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
</head>
<body>
  <div id="container">
    <aside id="sidebar">
      <button id="addProjectBtn">Add Project</button>
      <button id="addTaskBtn">Add Task</button>
      <ul id="projectList"></ul>
    </aside>
    <main id="mainContent">
      <h1 id="projectName">All Tasks</h1>
      <ul id="taskList"></ul>
    </main>
  </div>

<div id="projectModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>New Project</h2>
    <input type="text" id="projectNameInput" placeholder="Project's name">
    <button id="saveProjectBtn">Save</button>
  </div>
</div>

<div id="taskModal" class="modal">
  <div class="modal-content">
    <span class="close" id="closeTaskModal">&times;</span>
    <h2>Add Task</h2>
    <label for="taskTitle">Title:</label>
    <input type="text" id="taskTitle">

    <label for="taskDescription">Description:</label>
    <textarea id="taskDescription"></textarea>

    <label for="taskDueDate">Due Date:</label>
    <input type="date" id="taskDueDate">

    <label for="taskPriority">Priority:</label>
    <select id="taskPriority">
      <option value="low">Low</option>
      <option value="normal" selected>Normal</option>
      <option value="high">High</option>
    </select>

    <button id="saveTaskBtn">Save</button>
  </div>
</div>

  <script src="src/index.js"></script>
</body>
</html>
