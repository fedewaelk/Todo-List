<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
</head>
<body>
  <div id="container">
    <aside id="sidebar">
      <button id="addProjectBtn">Add Project</button>
      <button id="addTaskBtn">Add Task</button>
      <ul id="projectList"></ul>
    </aside>
    <main id="mainContent">
      <h1 id="projectName">All Tasks</h1>
      <ul id="taskList"></ul>
    </main>
  </div>

<div id="projectModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Nuevo Proyecto</h2>
    <input type="text" id="projectNameInput" placeholder="Nombre del proyecto">
    <button id="saveProjectBtn">Save</button>
  </div>
</div>

<div id="taskModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Add Task</h2>
    <input type="text" id="taskTitleInput" placeholder="Enter task title">
    <button id="confirmAddTask">Add Task</button>
  </div>
</div>


  <script src="src/index.js"></script>
</body>
</html>
